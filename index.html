<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind RAG - AI Document Q&A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .mode-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .mode-toggle input[type="radio"] {
            cursor: pointer;
        }

        .mode-toggle label:hover {
            background: #e0e0e0;
        }

        .mode-toggle input[type="radio"]:checked + span {
            color: #667eea;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: white;
            border: 1px solid #e0e0e0;
        }

        .message.thought {
            background: #fff3cd;
            border: 1px solid #ffc107;
            font-size: 0.9em;
            color: #856404;
            font-style: italic;
            max-width: 90%;
        }

        .message.sources {
            background: #f0f0f0;
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
            padding: 8px 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input, textarea, select {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .source-filter {
            margin-bottom: 15px;
        }

        .source-filter label {
            font-weight: 600;
            margin-right: 10px;
        }

        .source-filter select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
            min-width: 250px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 DocuMind RAG</h1>
            <p>AI-powered document Q&A with hybrid search & intelligent agents</p>
            <button onclick="newChat()" style="margin-top: 15px; padding: 8px 20px; font-size: 0.9em; background: rgba(255,255,255,0.2); border: 1px solid white;">
                🔄 New Chat
            </button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
            <div class="tab" onclick="switchTab('upload')">📤 Upload Document</div>
        </div>

        <div id="chat" class="tab-content active">
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <label>
                    <input type="radio" name="mode" value="rag" checked>
                    <span>📚 RAG Mode (Documents Only)</span>
                </label>
                <label>
                    <input type="radio" name="mode" value="agent">
                    <span>🤖 Agent Mode (RAG + Web + Calculator)</span>
                </label>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message assistant">
                    Hello! I'm DocuMind. Ask me anything about your uploaded documents or use Agent mode for web search and calculations.
                </div>
            </div>
            
            <!-- Source Filter Dropdown -->
            <div class="source-filter">
                <label>📁 Search in:</label>
                <select id="sourceFilter">
                    <option value="">All Documents</option>
                </select>
            </div>
            
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
                <button onclick="sendQuery()" id="sendBtn">Send</button>
            </div>
        </div>

        <div id="upload" class="tab-content">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">
                    📁 Select File (PDF, DOCX, TXT - Max 10MB)
                </label>
                <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="padding: 10px;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">
                    ✏️ Or Paste Text
                </label>
                <textarea id="textContent" placeholder="Paste your document text here..."></textarea>
            </div>
            
            <div style="margin-top: 15px;">
                <input type="text" id="sourceInput" placeholder="Source name (optional)" style="margin-bottom: 15px;">
                <button onclick="uploadContent()" id="uploadBtn">Upload & Process</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let chatHistory = [];  // Conversation history

        // Load available documents on page load
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_URL}/documents`);
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('sourceFilter');
                    data.documents.forEach(doc => {
                        const option = document.createElement('option');
                        option.value = doc.source;
                        option.textContent = `${doc.source} (${doc.chunk_count} chunks)`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load documents:', error);
            }
        }

        // Load history from localStorage on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadDocuments();  // Load available documents
            
            const saved = localStorage.getItem('documind_chat_history');
            if (saved) {
                chatHistory = JSON.parse(saved);
                // Render saved messages
                chatHistory.forEach(msg => {
                    addMessage(msg.content, msg.role === 'user' ? 'user' : 'assistant', false);
                });
            }
        });

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('documind_chat_history', JSON.stringify(chatHistory));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function newChat() {
            if (confirm('Start a new chat? Current conversation will be cleared.')) {
                chatHistory = [];
                localStorage.removeItem('documind_chat_history');
                
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.innerHTML = `
                    <div class="message assistant">
                        Hello! I'm DocuMind. Ask me anything about your uploaded documents or use Agent mode for web search and calculations.
                    </div>
                `;
            }
        }

        function addMessage(content, type, showSources = true) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        async function sendQuery() {
            const queryInput = document.getElementById('queryInput');
            const sendBtn = document.getElementById('sendBtn');
            const sourceFilter = document.getElementById('sourceFilter');
            const query = queryInput.value.trim();

            if (!query) return;

            // Get selected mode
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const endpoint = mode === 'agent' ? '/chat-agent-stream' : '/chat-stream';
            
            console.log(`🤖 Using ${mode} mode, endpoint: ${endpoint}`);

            // Add user message to UI and history
            addMessage(query, 'user', false);
            chatHistory.push({ role: 'user', content: query });
            saveHistory();
            
            queryInput.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="loading"></div>';

            // Create assistant message container
            const chatContainer = document.getElementById('chatContainer');
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant';
            assistantDiv.textContent = '';
            chatContainer.appendChild(assistantDiv);
            
            let fullResponse = '';

            try {
                // Use fetch with streaming
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query, 
                        top_k: 3,
                        history: chatHistory.slice(0, -1),
                        source_filter: sourceFilter.value || null
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    
                    // Parse Server-Sent Events
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            // Handle RAG mode (simple token format)
                            if (data.token) {
                                fullResponse += data.token;
                                assistantDiv.textContent = fullResponse;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                            
                            // Handle Agent mode (structured format with thoughts)
                            if (data.type === 'thought') {
                                // Show thought in a separate message bubble
                                addMessage(`💭 ${data.content}`, 'thought', false);
                            }
                            
                            if (data.type === 'answer_token') {
                                fullResponse += data.content;
                                assistantDiv.textContent = fullResponse;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                            
                            if (data.done) {
                                // Save to history when complete
                                chatHistory.push({ role: 'assistant', content: fullResponse });
                                saveHistory();
                            }
                        }
                    }
                }
            } catch (error) {
                assistantDiv.textContent = `Error: ${error.message}`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuery();
            }
        }

        async function uploadContent() {
            const fileInput = document.getElementById('fileInput');
            const textContent = document.getElementById('textContent').value.trim();
            const sourceInput = document.getElementById('sourceInput').value.trim();
            const uploadBtn = document.getElementById('uploadBtn');

            // Check if file is selected
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                // Validate size client-side
                if (file.size > 10 * 1024 * 1024) {
                    alert('❌ File too large. Max size: 10MB');
                    return;
                }
                
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<div class="loading"></div>';
                
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    const response = await fetch(`${API_URL}/upload-file`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        alert(`✅ File '${data.filename}' (${data.file_size_mb}MB) processed successfully!`);
                        fileInput.value = '';
                        document.getElementById('sourceInput').value = '';
                    } else {
                        alert(`❌ Error: ${data.detail}`);
                    }
                } catch (error) {
                    alert(`❌ Error: ${error.message}`);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Upload & Process';
                }
            } 
            // Otherwise use text upload
            else if (textContent) {
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<div class="loading"></div>';
                
                try {
                    const response = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text_content: textContent,
                            source: sourceInput || 'manual_upload'
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        alert('✅ Document uploaded successfully!');
                        document.getElementById('textContent').value = '';
                        document.getElementById('sourceInput').value = '';
                    } else {
                        alert(`❌ Error: ${data.detail}`);
                    }
                } catch (error) {
                    alert(`❌ Error: ${error.message}`);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Upload & Process';
                }
            } 
            else {
                alert('⚠️ Please select a file or paste text');
            }
        }
    </script>
</body>
</html>
